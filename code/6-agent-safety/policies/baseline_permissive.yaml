# ============================================================================
# DELIBERATELY WEAK OpenShell Policy — For Exercise 1 Validation Testing
# ============================================================================
# This policy contains THREE intentional security violations.
# Your job in Exercise 1 is to write a validator that catches all of them.
# ============================================================================

version: 1

process:
  run_as_user: "root"            # VIOLATION 1: Agent runs as root
  run_as_group: "root"           #   Agents must NEVER run as root — a compromised
                                 #   agent with root access owns the entire system.

filesystem_policy:
  read_only:
    - /usr/lib
    - /usr/bin
  read_write:
    - /                          # VIOLATION 2: Write access to entire filesystem
    - /tmp                       #   The agent can overwrite ANY file on the system,
                                 #   including /etc/passwd, /usr/bin, and system configs.

# VIOLATION 3: No network_policies section and no default_network_action.
# Without network controls, the agent can reach ANY endpoint on the internet,
# exfiltrate data, download malicious payloads, or phone home to a C2 server.
