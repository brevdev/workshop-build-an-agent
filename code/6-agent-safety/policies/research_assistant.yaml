# ============================================================================
# Hardened OpenShell Policy — Research Assistant Agent
# ============================================================================
# This policy follows the principle of least privilege:
#   - Non-root process identity (run_as_user: sandbox)
#   - Restricted filesystem (read-write only /sandbox and /tmp)
#   - Default-deny networking with explicit allowlist
#   - Per-binary, per-endpoint, per-method controls
#
# Format follows the OpenShell Policy Schema Reference:
#   https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
# ============================================================================

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  llm_api:
    name: llm-api-inference
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/bin/python3 }

  rss_feeds:
    name: rss-feeds-readonly
    endpoints:
      - host: arxiv.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/python3 }

  local_nemotron:
    name: local-nemotron-inference
    endpoints:
      - host: localhost
        port: 8080
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/bin/python3 }
